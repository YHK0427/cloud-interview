{% extends "base.html" %}

{% block title %}면접 진행 - 클라우드 면접 연습{% endblock %}

{% block content %}
<div class="interview-container">
    <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-text" id="progress-text">0 / 0</div>

    <div class="question-section">
        <span class="category-badge" id="category-badge"></span>
        <h2 id="question-text" class="question-text">질문을 불러오는 중...</h2>
    </div>

    <div class="answer-section">
        <div class="btn-group">
            <button id="listen-btn" class="btn btn-listen">질문 듣기</button>
            <button id="record-btn" class="btn btn-record">답변하기</button>
            <button id="stop-btn" class="btn btn-stop" disabled>답변 완료</button>
        </div>

        <div id="recording-indicator" class="recording-indicator" style="display:none;">
            <span class="recording-dot"></span> 음성 인식 중...
        </div>

        <div class="answer-box">
            <h3>내 답변</h3>
            <div id="answer-text" class="answer-text" contenteditable="true" placeholder="답변이 여기에 표시됩니다. 직접 입력도 가능합니다."></div>
        </div>
    </div>

    <div id="result-section" class="result-section" style="display:none;">
        <div class="model-answer-box">
            <h3 class="collapsible" id="model-answer-toggle">모범 답안 ▼</h3>
            <div id="model-answer-text" class="model-answer-text"></div>
        </div>

        <button id="feedback-btn" class="btn btn-feedback">피드백 보기</button>
        <div id="feedback-text" class="feedback-text" style="display:none;"></div>

        <button id="next-btn" class="btn btn-primary btn-lg">다음 질문</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const SESSION_NO = {{ session_no }};
</script>
<script src="{{ url_for('static', filename='js/interview.js') }}"></script>
{% endblock %}
