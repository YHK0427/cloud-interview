{% extends "base.html" %}

{% block title %}히스토리 - Cloud Interview{% endblock %}

{% block content %}
<div class="page-header">
    <h1>히스토리</h1>
    <p>과거 면접 연습 기록을 확인하세요</p>
</div>

<div id="history-list" class="history-list">
    <p class="loading">히스토리를 불러오는 중...</p>
</div>

<div id="session-detail" class="session-detail" style="display:none;">
    <div class="detail-header-bar">
        <button id="back-btn" class="btn btn-ghost">← 목록</button>
        <h2 id="detail-title"></h2>
    </div>
    <div id="detail-content"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const historyList = document.getElementById('history-list');
    const sessionDetail = document.getElementById('session-detail');
    const backBtn = document.getElementById('back-btn');
    const detailTitle = document.getElementById('detail-title');
    const detailContent = document.getElementById('detail-content');

    function loadHistory() {
        historyList.style.display = 'flex';
        sessionDetail.style.display = 'none';

        fetch('/api/history')
            .then(res => res.json())
            .then(sessions => {
                if (sessions.length === 0) {
                    historyList.innerHTML = '<p class="empty">아직 면접 기록이 없습니다.</p>';
                    return;
                }
                historyList.innerHTML = sessions.map(s => `
                    <div class="history-card" data-session="${s.session_no}">
                        <div class="history-info">
                            <h3>${s.session_no}회차</h3>
                            <span class="history-date">${s.date}</span>
                        </div>
                        <div class="history-meta">
                            <span class="history-count">${s.question_count}문제</span>
                            <span class="history-arrow">→</span>
                        </div>
                    </div>
                `).join('');

                document.querySelectorAll('.history-card').forEach(card => {
                    card.addEventListener('click', function() {
                        loadSessionDetail(this.dataset.session);
                    });
                });
            });
    }

    function loadSessionDetail(sessionNo) {
        historyList.style.display = 'none';
        sessionDetail.style.display = 'block';
        detailTitle.textContent = `${sessionNo}회차`;
        detailContent.innerHTML = '<p class="loading">불러오는 중...</p>';

        fetch(`/api/history/${sessionNo}`)
            .then(res => res.json())
            .then(items => {
                detailContent.innerHTML = items.map((item, i) => `
                    <div class="detail-card">
                        <div class="detail-top">
                            <span class="detail-num">${i + 1}</span>
                            <span class="category-badge">${item.category}</span>
                        </div>
                        <div class="detail-question-text">${item.question}</div>
                        <div class="detail-block answer">
                            <div class="detail-block-label">내 답변</div>
                            ${item.user_answer || '<span class="no-answer">답변 없음</span>'}
                        </div>
                        <div class="detail-block model">
                            <div class="detail-block-label">모범 답안</div>
                            ${item.model_answer}
                        </div>
                        ${item.feedback ? `
                        <div class="detail-block feedback">
                            <div class="detail-block-label">AI 피드백</div>
                            ${item.feedback.replace(/\n/g, '<br>')}
                        </div>` : ''}
                    </div>
                `).join('');
            });
    }

    backBtn.addEventListener('click', loadHistory);
    loadHistory();
});
</script>
{% endblock %}
