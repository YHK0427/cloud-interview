apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      serviceAccountName: mysql-sa
      containers:
        - name: mysql-container
          image: yhk0427/interview-mysql:1.1
          ports:
            - containerPort: 3306
          envFrom:
            - configMapRef:
                name: mysql-config
          env:
            - name: MYSQL_ROOT_PASSWORD_FILE
              value: /etc/secrets/MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-secret
              mountPath: /etc/secrets
              readOnly: true
            - name: mysql-data
              mountPath: /var/lib/mysql
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: mysql-secret
          secret:
            secretName: mysql-secret
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc
